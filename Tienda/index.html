<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Virtual - Dashboard</title>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" href="css/estilos.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <script src="js/app.js" defer></script>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="container">
    <nav class="nav-menu">
        <button id="btn-nav-inventario" class="nav-btn activo">
            <i class="bi bi-box-seam"></i> Inventario
        </button>
        <button id="btn-nav-registro" class="nav-btn">
            <i class="bi bi-plus-circle"></i> Nuevo Producto
        </button>
    </nav>

    <section id="seccion-inventario" class="seccion-activa">
        <div class="header-title">
            <h2>Inventario Actual</h2>
           
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                            
                        <th>Nombre</th>
                        <th>Descripción</th>
                        <th>Precio</th>
                        <th>Estado Actual</th>
                        <th>Modificar Valores</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-productos">
                    </tbody>
            </table>
        </div>
    </section>

    <section id="seccion-registro" style="display: none;">
        <div class="header-title">
            <h2>Registro de Productos</h2>
        </div>

        <form id="form-registrar">
            <div class="input-group">
                <label for="nombre">Nombre del Producto:</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Ej. Teclado Mecánico">
            </div>
            
            <div class="input-group">
                <label for="descripcion">Descripción:</label>
                <textarea id="descripcion" name="descripcion" rows="2" required placeholder="Detalles del producto..."></textarea>
            </div>
            
            <div class="input-group">
                <label for="precio">Precio ($):</label>
<input type="number" step="0.01" min="0.01" id="precio" name="precio" required placeholder="0.00">
            </div>
            
            <button type="submit" id="btn-registrar">
                <i class="bi bi-floppy"></i> Registrar Producto
            </button>
        </form>
    </section>

</div>

</body>
</html>
